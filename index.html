<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>GTM 세일즈 파이프라인</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 설정 미완료 안내 -->
  <div id="setup-screen" class="gate hidden">
    <div class="gate-card">
      <h1>⚙️ 초기 설정 필요</h1>
      <p><code>config.js</code>에 Supabase URL과 anon key를 입력해주세요.<br>
      자세한 절차는 <code>README.md</code>를 참고하세요.</p>
    </div>
  </div>

  <!-- 로그인 게이트 -->
  <div id="login-screen" class="gate hidden">
    <div class="gate-card">
      <h1><img src="assets/wyyyes-logo-white.png" alt="WYYYES" class="gate-logo"><span class="gate-sub">GTM Sales Pipeline</span></h1>
      <p>팀 공용 비밀번호를 입력하세요.</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit" id="login-btn">입장</button>
        <div id="login-error" class="error-msg hidden"></div>
      </form>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo"><img src="assets/wyyyes-logo-white.png" alt="WYYYES" class="logo-img"> GTM 세일즈 파이프라인</span>
        <nav class="tabs">
          <button class="tab-btn active" data-tab="dashboard">대시보드</button>
          <button class="tab-btn" data-tab="board">보드</button>
          <button class="tab-btn" data-tab="table">테이블</button>
        </nav>
      </div>
      <div class="topbar-right">
        <select id="me-select" title="내 이름 (히스토리 기록용)"></select>
        <button id="add-btn" class="primary">+ 신규 등록</button>
        <button id="export-btn" title="CSV 내보내기">CSV</button>
        <button id="logout-btn" title="로그아웃">로그아웃</button>
      </div>
    </header>

    <!-- 대시보드 -->
    <main id="tab-dashboard" class="tab-panel">
      <div class="filter-row">
        <select id="dash-type-filter">
          <option value="">전체 유형</option>
          <option value="dealer">딜러</option>
          <option value="influencer">인플루언서</option>
        </select>
      </div>
      <section class="kpi-row" id="kpi-row"></section>
      <div class="dash-grid">
        <section class="card">
          <h2>파이프라인 퍼널</h2>
          <div id="funnel"></div>
        </section>
        <section class="card">
          <h2>팔로업 필요 (7일+ 업데이트 없음)</h2>
          <div id="followup-list" class="fu-list"></div>
        </section>
        <section class="card">
          <h2>담당자별 현황</h2>
          <div id="by-owner"></div>
        </section>
        <section class="card">
          <h2>카테고리별</h2>
          <div id="by-category"></div>
        </section>
        <section class="card">
          <h2>발굴 채널별</h2>
          <div id="by-channel"></div>
        </section>
        <section class="card">
          <h2>최근 활동</h2>
          <div id="recent-activities" class="timeline"></div>
        </section>
      </div>
    </main>

    <!-- 칸반 보드 -->
    <main id="tab-board" class="tab-panel hidden">
      <div class="filter-row">
        <select id="board-type-filter">
          <option value="">전체 유형</option>
          <option value="dealer">딜러</option>
          <option value="influencer">인플루언서</option>
        </select>
        <select id="board-owner-filter"><option value="">전체 담당자</option></select>
        <label class="chk"><input type="checkbox" id="board-show-closed"> 보류/제외 표시</label>
      </div>
      <div id="board" class="board"></div>
    </main>

    <!-- 테이블 -->
    <main id="tab-table" class="tab-panel hidden">
      <div class="filter-row">
        <input type="search" id="table-search" placeholder="이름/상품/메모 검색…">
        <select id="table-type-filter">
          <option value="">전체 유형</option>
          <option value="dealer">딜러</option>
          <option value="influencer">인플루언서</option>
        </select>
        <select id="table-stage-filter"><option value="">전체 단계</option></select>
        <select id="table-category-filter"><option value="">전체 카테고리</option></select>
        <select id="table-channel-filter"><option value="">전체 채널</option></select>
        <select id="table-owner-filter"><option value="">전체 담당자</option></select>
        <span id="table-count" class="muted"></span>
      </div>
      <div class="table-wrap">
        <table id="leads-table">
          <thead>
            <tr>
              <th data-sort="name">이름</th>
              <th data-sort="type">유형</th>
              <th data-sort="category">카테고리</th>
              <th data-sort="stage">단계</th>
              <th data-sort="channel">채널</th>
              <th data-sort="followers">팔로워</th>
              <th data-sort="main_products">주요 상품</th>
              <th data-sort="notes">비고</th>
              <th data-sort="contact_date">컨택일</th>
              <th data-sort="owner">담당자</th>
              <th data-sort="updated_at">수정일</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- 등록/수정 모달 -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="modal-title">신규 등록</h2>
      <form id="lead-form">
        <div class="form-grid">
          <label>유형*
            <select name="type" id="form-type">
              <option value="dealer">딜러 (판매자)</option>
              <option value="influencer">인플루언서</option>
            </select>
          </label>
          <label>단계*
            <select name="stage" id="form-stage"></select>
          </label>
          <label>카테고리
            <select name="category" id="form-category"></select>
          </label>
          <label>담당자
            <select name="owner" id="form-owner"></select>
          </label>
          <label class="span2">이름 (셀러/인플루언서명)*
            <input name="name" required>
          </label>
          <label class="span2">링크 (프로필/샵 URL)
            <input name="link" type="url" placeholder="https://…">
          </label>
          <label>발굴 채널
            <input name="channel" list="channel-options">
            <datalist id="channel-options"></datalist>
          </label>
          <label>온/오프라인
            <select name="channel_type">
              <option value="온라인">온라인</option>
              <option value="오프라인">오프라인</option>
            </select>
          </label>
          <label>팔로워/관심고객
            <input name="followers" type="number" min="0">
          </label>
          <label>컨택포인트
            <input name="contact_point" placeholder="예: 인스타그램 DM, 이메일">
          </label>
          <label class="span2 dealer-only">샵 상세
            <input name="shop_detail" placeholder="예: 홍대 오프라인 샵 / 스마트스토어">
          </label>
          <label class="span2">주요 상품 / 콘텐츠
            <input name="main_products" placeholder="예: 애니굿즈/피규어/제일복권">
          </label>
          <label>컨택일
            <input name="contact_date" type="date">
          </label>
          <label class="influencer-only span2">협업 유형
            <input name="extra_collab_type" placeholder="예: 라이브 출연, 공동 브레이크, 홍보 콘텐츠">
          </label>
          <label>와이스 닉네임
            <input name="nickname">
          </label>
          <label>승인일
            <input name="approved_at" type="date">
          </label>
          <label class="span2">비고
            <textarea name="notes" rows="2"></textarea>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-delete" class="danger hidden">삭제</button>
          <span class="spacer"></span>
          <button type="button" id="modal-cancel">취소</button>
          <button type="submit" class="primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 상세 드로어 -->
  <div id="drawer-backdrop" class="drawer-backdrop hidden">
    <aside class="drawer">
      <div class="drawer-head">
        <span id="drawer-type"></span>
        <input id="drawer-name-input" class="drawer-name-input" title="이름 (수정 가능)">
        <button id="drawer-close">✕</button>
      </div>
      <p class="drawer-hint muted">필드를 수정하면 바로 저장됩니다.</p>
      <div id="drawer-info" class="drawer-info"></div>
      <h3>히스토리</h3>
      <form id="memo-form" class="memo-form">
        <input id="memo-input" placeholder="메모 추가…">
        <button type="submit">추가</button>
      </form>
      <div id="drawer-timeline" class="timeline"></div>
      <div class="drawer-foot">
        <button id="drawer-delete" class="danger">이 항목 삭제</button>
      </div>
    </aside>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
